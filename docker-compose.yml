services:
  server:
    build:
      context: ./server
    env_file:
      - ./server/.env
    ports:
      - "4000:4000"

  client:
    build:
      context: ./client
      args:
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
        VITE_REDIRECT_URI: ${VITE_REDIRECT_URI}
    ports:
      - "80:80"
    depends_on:
      - server